name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  checks: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npm run format:check

      - name: Run tests
        run: |
          mkdir -p reports
          npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml

      - name: Publish test report
        if: always() && hashFiles('reports/vitest-junit.xml') != ''
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: reports/vitest-junit.xml
          detailed_summary: true
          include_passed: true

      - name: Upload test report artifact
        if: always() && hashFiles('reports/vitest-junit.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit-report
          path: reports/vitest-junit.xml
          if-no-files-found: error
